<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting for reservations, trip information, questions, and customer support.">
    <meta name="author" content="John Chukwu">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>

        <img src="images/rafting_logo.jpg" alt="Rafting Company Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <h1 class="contact-title">White Water Rafting Company</h1>

        <section class="company-info">
            <h2>Company Information</h2>

            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>

        </section>

        <section class="contact-container">
            <h2>Contact Form</h2>

            <div class="map">

                <iframe src="https://www.google.com/maps/embed?pb=YOUR_GOOGLE_MAP_EMBED_CODE"
                  loading="lazy" allowfullscreen>
                </iframe>

            </div>

            <div class="contact-form">

                <form action="#" method="post">

                    <div class="form-row">

                        <label for="fullname">Name</label>

                        <input type="text" id="fullname" name="fullname"
                          placeholder="Enter your name" required>

                    </div>

                    <div class="form-row">

                        <label for="email">Email</label>

                        <input type="email" id="email" name="email" placeholder="Enter your email"
                          required>

                    </div>

                    <div class="form-row purpose">

                        <label>Message Purpose</label>

                        <div class="radio-group">

                            <label>
                                <input type="radio" id="general" name="purpose" value="general"
                                  checked>
                                General Inquiry
                            </label>

                            <label>
                                <input type="radio" id="reservation" name="purpose"
                                  value="reservation">
                                Reservation Question
                            </label>

                            <label>
                                <input type="radio" id="suggestion" name="purpose"
                                  value="suggestion">
                                ] Website Suggestion
                            </label>

                        </div>

                    </div>

                    <div class="form-row">

                        <label for="message">Message</label>

                        <textarea id="message" name="message" rows="5"
                          placeholder="Type your message here" required></textarea>

                    </div>

                    <div class="newsletter">

                        <label>
                            <input type="checkbox" id="newsletter" name="newsletter">
                            Please Subscribe me to the monthly newsletter
                        </label>

                    </div>

                    <button type="submit">
                        Get in Touch!
                    </button>

                </form>

            </div>

        </section>

        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-gallery">

                <figure>
                    <img src="images/employee1.jpg" alt="Sarah Johnson">
                    <figcaption>
                        Sarah Johnson<br>
                        General Manager
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Michael Brown">
                    <figcaption>
                        Michael Brown<br>
                        Lead River Guide
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Emily Davis">
                    <figcaption>
                        Emily Davis<br>
                        Customer Service Representative
                    </figcaption>
                </figure>

            </div>

        </section>

    </main>

    <footer>

        <p>
            © 2026 White Water Rafting | John Chukwu
        </p>

        <nav class="socialmedia">

            <a href="https://facebook.com" aria-label="Facebook">
                <img src="images/facebook.jpg" alt="Facebook">
            </a>

            <a href="https://instagram.com" aria-label="Instagram">
                <img src="images/instagram.jpg" alt="Instagram">
            </a>

            <a href="https://linkedin.com" aria-label="LinkedIn">
                <img src="images/linkedin.jpg" alt="LinkedIn">
            </a>

        </nav>

    </footer>
</body>

</html>
