<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <header>
        <h1>Basic HTML and CSS Quiz</h1>
    </header>

    <main>
        <form>

            <div class="form-item">
                <label for="q1">
                    1. What does the acronym CSS stand for?
                </label>
                <input type="text" id="q1" name="q1">
            </div>

            <div class="form-item">
                <label for="q2">
                    2. Explain how id and class selectors are used in CSS.
                </label>
                <textarea id="q2" name="q2" rows="4"></textarea>
            </div>

            <div class="form-item">
                <label for="q3">
                    3. Which of the following is a valid CSS comment?
                </label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="comment1">/* This is a comment */</option>
                    <option value="comment2">// This is a comment</option>
                    <option value="comment3">&lt;!-- This is a comment --&gt;</option>
                </select>
            </div>

            <div class="form-item">
                <label for="q4">
                    4. What is the bottom margin given this declaration?
                </label>

                <pre>margin: 10px 5px 15px;</pre>

                <input type="number" id="q4" name="q4">
            </div>

            <button type="submit">Submit Quiz</button>

        </form>
    </main>

</body>

</html>
